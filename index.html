<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de F&eacute;rias</title>
    <style>
        :root {
            --primary-color: #2b579a;
            --secondary-color: #e2e8f0;
            --success-color: #2ecc71;
            --lock-color: #e74c3c;
            --text-color: #333;
            --edit-color: #f39c12;
            --delete-color: #c0392b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* Formul&aacute;rio de Cadastro */
        .form-cadastro {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--secondary-color);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1e3d6b;
        }

        .btn-add {
            grid-column: 1 / -1;
            padding: 12px;
            background-color: var(--success-color);
        }
        .btn-add:hover {
            background-color: #27ae60;
        }

        /* Tabela de Dados */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* &Aacute;rea do Supervisor */
        .supervisor-cell {
            background-color: #fff9e6;
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 180px;
        }

        .supervisor-input {
            width: 120px;
            padding: 6px;
            font-size: 13px;
        }

        .btn-lock {
            background-color: var(--lock-color);
            padding: 6px 10px;
            font-size: 12px;
        }
        .btn-lock:hover {
            background-color: #c0392b;
        }

        /* Bot&otilde;es de A&ccedil;&atilde;o */
        .action-cell {
            white-space: nowrap;
        }

        .btn-edit {
            background-color: var(--edit-color);
            padding: 6px 10px;
            font-size: 12px;
            margin-right: 4px;
        }
        .btn-edit:hover {
            background-color: #d35400;
        }

        .btn-delete {
            background-color: var(--delete-color);
            padding: 6px 10px;
            font-size: 12px;
        }
        .btn-delete:hover {
            background-color: #a0281e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle de F&eacute;rias</h1>

    <form id="feriasForm" class="form-cadastro">
        <input type="hidden" id="editIndex" value="-1">

        <div class="form-group">
            <label for="nome">Nome do Funcion&aacute;rio</label>
            <input type="text" id="nome" required placeholder="Ex: Joao Silva">
        </div>
        
        <div class="form-group">
            <label for="admissao">Data de Admiss&atilde;o</label>
            <input type="date" id="admissao" required>
        </div>

        <div class="form-group">
            <label for="opcao1">Op&ccedil;&atilde;o de M&ecirc;s 1</label>
            <select id="opcao1" required></select>
        </div>

        <div class="form-group">
            <label for="opcao2">Op&ccedil;&atilde;o de M&ecirc;s 2</label>
            <select id="opcao2" required></select>
        </div>

        <div class="form-group">
            <label for="opcao3">Op&ccedil;&atilde;o de M&ecirc;s 3</label>
            <select id="opcao3" required></select>
        </div>

        <button type="submit" id="btnSalvar" class="btn-add">&#10133; Adicionar Funcion&aacute;rio &agrave; Lista</button>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Admiss&atilde;o</th>
                    <th>Op&ccedil;&atilde;o 1</th>
                    <th>Op&ccedil;&atilde;o 2</th>
                    <th>Op&ccedil;&atilde;o 3</th>
                    <th>In&iacute;cio das F&eacute;rias (Supervisor)</th>
                    <th>A&ccedil;&otilde;es</th>
                </tr>
            </thead>
            <tbody id="tabelaFuncionarios">
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- CONFIGURA&Ccedil;&Atilde;O ---
    const SENHA_SUPERVISOR = "159753"; // Senha mantida conforme seu arquivo original

    // Lista de meses convertida para evitar erros de acentua&ccedil;&atilde;o
    const meses = [
        "Janeiro", "Fevereiro", "Mar\u00E7o", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    let funcionarios = JSON.parse(localStorage.getItem('funcionarios_data')) || [];

    function preencherMeses() {
        const selects = ['opcao1', 'opcao2', 'opcao3'];
        selects.forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Selecione...</option>';
            meses.forEach(mes => {
                const opt = document.createElement('option');
                opt.value = mes;
                opt.textContent = mes;
                select.appendChild(opt);
            });
        });
    }

    function formatarData(dataString) {
        if(!dataString) return "";
        const data = new Date(dataString);
        return data.toLocaleDateString('pt-BR', {timeZone: 'UTC'});
    }

    function renderizarTabela() {
        const tbody = document.getElementById('tabelaFuncionarios');
        tbody.innerHTML = '';

        funcionarios.forEach((func, index) => {
            const tr = document.createElement('tr');

            tr.innerHTML = `
                <td><strong>${func.nome}</strong></td>
                <td>${formatarData(func.admissao)}</td>
                <td>${func.opcao1}</td>
                <td>${func.opcao2}</td>
                <td>${func.opcao3}</td>
                <td class="supervisor-cell">
                    <input type="text" 
                           class="supervisor-input" 
                           placeholder="Ex: 15 de Mar\u00E7o" 
                           value="${func.dataDefinida || ''}" 
                           id="input-sup-${index}" 
                           oninput="atualizarValor(${index}, this.value)"
                           disabled>
                    <button class="btn-lock" id="btn-lock-${index}" onclick="alternarBloqueio(${index})">&#128274;</button>
                </td>
                <td class="action-cell">
                    <button class="btn-edit" onclick="editarFuncionario(${index})">&#9998; Editar</button>
                    <button class="btn-delete" onclick="excluirFuncionario(${index})">&#128465; Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('feriasForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const editIndex = parseInt(document.getElementById('editIndex').value);

        const dadosFuncionario = {
            nome: document.getElementById('nome').value,
            admissao: document.getElementById('admissao').value,
            opcao1: document.getElementById('opcao1').value,
            opcao2: document.getElementById('opcao2').value,
            opcao3: document.getElementById('opcao3').value,
            dataDefinida: editIndex !== -1 ? funcionarios[editIndex].dataDefinida : "" 
        };

        if (editIndex === -1) {
            funcionarios.push(dadosFuncionario);
        } else {
            funcionarios[editIndex] = dadosFuncionario;
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnSalvar').className = "btn-add";
            document.getElementById('btnSalvar').innerHTML = "&#10133; Adicionar Funcion&aacute;rio &agrave; Lista";
            document.getElementById('btnSalvar').style.backgroundColor = "var(--success-color)";
        }

        salvarDados();
        renderizarTabela();
        this.reset();
    });

    function editarFuncionario(index) {
        const func = funcionarios[index];
        
        document.getElementById('nome').value = func.nome;
        document.getElementById('admissao').value = func.admissao;
        document.getElementById('opcao1').value = func.opcao1;
        document.getElementById('opcao2').value = func.opcao2;
        document.getElementById('opcao3').value = func.opcao3;
        
        document.getElementById('editIndex').value = index;
        
        const btnSalvar = document.getElementById('btnSalvar');
        btnSalvar.innerHTML = "&#128190; Salvar Altera&ccedil;&otilde;es";
        btnSalvar.style.backgroundColor = "var(--edit-color)";
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function excluirFuncionario(index) {
        const confirmar = confirm("Tem certeza que deseja excluir este funcion\u00E1rio?");
        if (confirmar) {
            funcionarios.splice(index, 1);
            salvarDados();
            renderizarTabela();
            
            document.getElementById('feriasForm').reset();
            document.getElementById('editIndex').value = "-1";
            const btnSalvar = document.getElementById('btnSalvar');
            btnSalvar.innerHTML = "&#10133; Adicionar Funcion&aacute;rio &agrave; Lista";
            btnSalvar.style.backgroundColor = "var(--success-color)";
        }
    }

    function alternarBloqueio(index) {
        const input = document.getElementById(`input-sup-${index}`);
        const btn = document.getElementById(`btn-lock-${index}`);

        if (!input.disabled) {
            input.disabled = true;
            btn.innerHTML = "&#128274;";
            salvarDados();
            return;
        }

        const senhaInserida = prompt("Digite a senha do supervisor:");
        
        if (senhaInserida === SENHA_SUPERVISOR) {
            input.disabled = false;
            btn.innerHTML = "&#128275;";
            
            setTimeout(() => input.focus(), 50);
            
            input.onkeydown = function(e) {
                if(e.key === 'Enter') {
                    input.disabled = true;
                    btn.innerHTML = "&#128274;";
                    salvarDados();
                }
            }
        } else if (senhaInserida !== null) {
            alert("Senha incorreta! Acesso negado.");
        }
    }

    function atualizarValor(index, valor) {
        funcionarios[index].dataDefinida = valor;
        salvarDados();
    }

    function salvarDados() {
        localStorage.setItem('funcionarios_data', JSON.stringify(funcionarios));
    }

    preencherMeses();
    renderizarTabela();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Férias</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2b579a;
            --secondary-color: #e2e8f0;
            --success-color: #2ecc71;
            --lock-color: #e74c3c;
            --text-color: #333;
            --edit-color: #f39c12;
            --delete-color: #c0392b;
            --print-color: #9b59b6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* Formulário de Cadastro */
        .form-cadastro {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--secondary-color);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1e3d6b;
        }

        button:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .btn-add {
            grid-column: 1 / -1;
            padding: 12px;
            background-color: var(--success-color);
        }
        .btn-add:hover {
            background-color: #27ae60;
        }

        /* Área de Filtro e Ações Globais */
        .filtro-container {
            background: #fff;
            border: 2px solid var(--secondary-color);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filtro-container .form-group {
            flex: 1;
            min-width: 250px;
        }

        .btn-print {
            background-color: var(--print-color);
            padding: 11px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: fit-content;
        }
        .btn-print:hover {
            background-color: #8e44ad;
        }

        /* Tabela de Dados */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* Área do Supervisor */
        .supervisor-cell {
            background-color: #fff9e6;
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 180px;
        }

        .supervisor-input {
            width: 120px;
            padding: 6px;
            font-size: 13px;
        }

        .btn-lock {
            background-color: var(--lock-color);
            padding: 6px 10px;
            font-size: 12px;
        }
        .btn-lock:hover:not(:disabled) {
            background-color: #c0392b;
        }

        /* Botões de Ação */
        .action-cell {
            white-space: nowrap;
        }

        .btn-edit {
            background-color: var(--edit-color);
            padding: 6px 10px;
            font-size: 12px;
            margin-right: 4px;
        }
        .btn-edit:hover:not(:disabled) {
            background-color: #d35400;
        }

        .btn-delete {
            background-color: var(--delete-color);
            padding: 6px 10px;
            font-size: 12px;
        }
        .btn-delete:hover:not(:disabled) {
            background-color: #a0281e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Controle de Férias</h1>

    <form id="feriasForm" class="form-cadastro">
        <input type="hidden" id="editIndex" value="-1">

        <div class="form-group">
            <label for="nome">Nome do Funcionário</label>
            <input type="text" id="nome" required placeholder="Ex: Joao Silva">
        </div>
        
        <div class="form-group">
            <label for="admissao">Data de Admissão</label>
            <input type="date" id="admissao" required>
        </div>

        <div class="form-group full-width">
            <label for="funcao">Função</label>
            <input type="text" id="funcao" required placeholder="Ex: Administrativo, Setor Tecnico...">
        </div>

        <div class="form-group">
            <label for="opcao1">Opção de Mês 1</label>
            <select id="opcao1" required></select>
        </div>

        <div class="form-group">
            <label for="opcao2">Opção de Mês 2</label>
            <select id="opcao2" required></select>
        </div>

        <div class="form-group">
            <label for="opcao3">Opção de Mês 3</label>
            <select id="opcao3" required></select>
        </div>

        <button type="submit" id="btnSalvar" class="btn-add">&#10133; Adicionar Funcionário à Lista</button>
    </form>

    <div class="filtro-container">
        <div class="form-group">
            <label for="filtroFuncao">🔍 Filtrar por Função</label>
            <input type="text" id="filtroFuncao" oninput="filtrarTabela()" placeholder="Digite uma função para buscar na tabela...">
        </div>
        <button class="btn-print" onclick="gerarPDF()">🖨️ Imprimir Relatório PDF</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Admissão</th>
                    <th>Função</th>
                    <th>Opção 1</th>
                    <th>Opção 2</th>
                    <th>Opção 3</th>
                    <th>Início das Férias</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaFuncionarios">
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    const SENHA_SUPERVISOR = "159753"; 

    const meses = [
        "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    let funcionarios = JSON.parse(localStorage.getItem('funcionarios_data')) || [];
    
    let linhasDesbloqueadas = {};

    function preencherMeses() {
        const selects = ['opcao1', 'opcao2', 'opcao3'];
        selects.forEach(id => {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Selecione...</option>';
            meses.forEach(mes => {
                const opt = document.createElement('option');
                opt.value = mes;
                opt.textContent = mes;
                select.appendChild(opt);
            });
        });
    }

    function formatarData(dataString) {
        if(!dataString) return "";
        const data = new Date(dataString);
        return data.toLocaleDateString('pt-BR', {timeZone: 'UTC'});
    }

    function renderizarTabela() {
        const tbody = document.getElementById('tabelaFuncionarios');
        tbody.innerHTML = '';

        funcionarios.forEach((func, index) => {
            const tr = document.createElement('tr');
            
            const estaDesbloqueado = linhasDesbloqueadas[index] === true;
            const disabledAttr = estaDesbloqueado ? '' : 'disabled';
            const iconeCadeado = estaDesbloqueado ? '&#128275;' : '&#128274;';

            tr.innerHTML = `
                <td><strong>${func.nome}</strong></td>
                <td>${formatarData(func.admissao)}</td>
                <td class="col-funcao">${func.funcao || ''}</td>
                <td>${func.opcao1}</td>
                <td>${func.opcao2}</td>
                <td>${func.opcao3}</td>
                <td class="supervisor-cell">
                    <input type="text" 
                           class="supervisor-input" 
                           placeholder="Ex: 15 de Março" 
                           value="${func.dataDefinida || ''}" 
                           id="input-sup-${index}" 
                           oninput="atualizarValor(${index}, this.value)"
                           ${disabledAttr}>
                    <button class="btn-lock" id="btn-lock-${index}" onclick="alternarBloqueio(${index})">${iconeCadeado}</button>
                </td>
                <td class="action-cell">
                    <button class="btn-edit" id="btn-edit-${index}" onclick="editarFuncionario(${index})" ${disabledAttr}>&#9998; Editar</button>
                    <button class="btn-delete" id="btn-delete-${index}" onclick="excluirFuncionario(${index})" ${disabledAttr}>&#128465; Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
        
        filtrarTabela();
    }

    document.getElementById('feriasForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const editIndex = parseInt(document.getElementById('editIndex').value);

        const dadosFuncionario = {
            nome: document.getElementById('nome').value,
            admissao: document.getElementById('admissao').value,
            funcao: document.getElementById('funcao').value,
            opcao1: document.getElementById('opcao1').value,
            opcao2: document.getElementById('opcao2').value,
            opcao3: document.getElementById('opcao3').value,
            dataDefinida: editIndex !== -1 ? funcionarios[editIndex].dataDefinida : "" 
        };

        if (editIndex === -1) {
            funcionarios.push(dadosFuncionario);
        } else {
            funcionarios[editIndex] = dadosFuncionario;
            delete linhasDesbloqueadas[editIndex];
            
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnSalvar').className = "btn-add";
            document.getElementById('btnSalvar').innerHTML = "&#10133; Adicionar Funcionário à Lista";
            document.getElementById('btnSalvar').style.backgroundColor = "var(--success-color)";
        }

        salvarDados();
        renderizarTabela();
        this.reset();
    });

    function editarFuncionario(index) {
        if (!linhasDesbloqueadas[index]) return;

        const func = funcionarios[index];
        
        document.getElementById('nome').value = func.nome;
        document.getElementById('admissao').value = func.admissao;
        document.getElementById('funcao').value = func.funcao || '';
        document.getElementById('opcao1').value = func.opcao1;
        document.getElementById('opcao2').value = func.opcao2;
        document.getElementById('opcao3').value = func.opcao3;
        
        document.getElementById('editIndex').value = index;
        
        const btnSalvar = document.getElementById('btnSalvar');
        btnSalvar.innerHTML = "&#128190; Salvar Alterações";
        btnSalvar.style.backgroundColor = "var(--edit-color)";
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function excluirFuncionario(index) {
        if (!linhasDesbloqueadas[index]) return;

        const confirmar = confirm("Tem certeza que deseja excluir este funcionário?");
        if (confirmar) {
            funcionarios.splice(index, 1);
            delete linhasDesbloqueadas[index];
            salvarDados();
            renderizarTabela();
            
            document.getElementById('feriasForm').reset();
            document.getElementById('editIndex').value = "-1";
            const btnSalvar = document.getElementById('btnSalvar');
            btnSalvar.innerHTML = "&#10133; Adicionar Funcionário à Lista";
            btnSalvar.style.backgroundColor = "var(--success-color)";
        }
    }

    function alternarBloqueio(index) {
        const estaDesbloqueado = linhasDesbloqueadas[index] === true;

        if (estaDesbloqueado) {
            delete linhasDesbloqueadas[index];
            salvarDados();
            renderizarTabela();
            return;
        }

        const senhaInserida = prompt("Digite a senha do supervisor para liberar esta linha:");
        
        if (senhaInserida === SENHA_SUPERVISOR) {
            linhasDesbloqueadas[index] = true;
            renderizarTabela();
            
            const input = document.getElementById(`input-sup-${index}`);
            setTimeout(() => input.focus(), 50);
            
            input.onkeydown = function(e) {
                if(e.key === 'Enter') {
                    delete linhasDesbloqueadas[index];
                    salvarDados();
                    renderizarTabela();
                }
            }
        } else if (senhaInserida !== null) {
            alert("Senha incorreta! Acesso negado.");
        }
    }

    function filtrarTabela() {
        const termoFiltro = document.getElementById('filtroFuncao').value.toLowerCase();
        const linhas = document.querySelectorAll('#tabelaFuncionarios tr');

        linhas.forEach(linha => {
            const celulaFuncao = linha.querySelector('.col-funcao');
            if (celulaFuncao) {
                const textoFuncao = celulaFuncao.textContent.toLowerCase();
                if (textoFuncao.includes(termoFiltro)) {
                    linha.style.display = '';
                } else {
                    linha.style.display = 'none';
                }
            }
        });
    }

    function atualizarValor(index, valor) {
        funcionarios[index].dataDefinida = valor;
        salvarDados();
    }

    function salvarDados() {
        localStorage.setItem('funcionarios_data', JSON.stringify(funcionarios));
    }

    // --- NOVA FUNÇÃO: GERAR PDF AGRUPADO POR FUNÇÃO ---
    function gerarPDF() {
        if (funcionarios.length === 0) {
            alert("Não há dados na tabela para exportar.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        // Título Principal do Documento
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(18);
        doc.setTextColor(43, 87, 154); // Cor #2b579a
        doc.text("Relatório Geral de Controle de Férias", 14, 20);
        
        // Data de emissão
        doc.setFontSize(10);
        doc.setFont("Helvetica", "normal");
        doc.setTextColor(100, 100, 100);
        doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`, 14, 27);

        // Agrupando funcionários por Função/Setor
        const agrupadoPorFuncao = {};
        funcionarios.forEach(func => {
            const funcaoNome = (func.funcao || "Não Especificada").trim().toUpperCase();
            if (!agrupadoPorFuncao[funcaoNome]) {
                agrupadoPorFuncao[funcaoNome] = [];
            }
            agrupadoPorFuncao[funcaoNome].push(func);
        });

        let posY = 35;

        // Gerar tabelas separadas para cada grupo de função
        Object.keys(agrupadoPorFuncao).sort().forEach(funcao => {
            // Verifica espaço restante na folha antes de printar o cabeçalho do grupo
            if (posY > 250) {
                doc.addPage();
                posY = 20;
            }

            // Subtítulo do Setor/Função
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(13);
            doc.setTextColor(51, 51, 51);
            doc.text(`SETOR / FUNÇÃO: ${funcao}`, 14, posY);
            posY += 4;

            // Mapeando dados das linhas para este setor específico
            const dadosTabela = agrupadoPorFuncao[funcao].map(f => [
                f.nome,
                formatarData(f.admissao),
                f.dataDefinida || "Não Definido"
            ]);

            // Renderiza a tabela do setor
            doc.autoTable({
                startY: posY,
                head: [['Nome do Funcionário', 'Data de Admissão', 'Início das Férias']],
                body: dadosTabela,
                theme: 'striped',
                headStyles: { fillColor: [43, 87, 154], fontStyle: 'bold' },
                styles: { fontSize: 10, cellPadding: 4 },
                margin: { left: 14, right: 14 },
                didDrawPage: function(data) {
                    posY = data.cursor.y + 12; // Atualiza a posição Y para a próxima seção
                }
            });
            
            // Sincroniza a posição atual de Y após a impressão da tabela autotable
            posY = doc.lastAutoTable.finalY + 12;
        });

        // Baixa o arquivo PDF
        doc.save(`relatorio-ferias-${new Date().toISOString().slice(0,10)}.pdf`);
    }

    preencherMeses();
    renderizarTabela();
</script>

</body>
</html>
